# Use the OpenCode CLI as the backend.
# Requires: OpenCode installed and available on PATH.
#
# Assumptions:
#   - `opencode ask "<prompt>"` sends a one-shot prompt
#   - `--model` selects the model
#   - No structured JSON output; raw stdout is captured
#
# Limitations:
#   - max_tokens is not enforced
#   - temperature is not enforced
#   - streaming is not supported
#   - No usage/token reporting
#   - Model list depends on OpenCode's own config
model:
  runtime_model: cli/opencode/default
  backend:
    provider: opencode
    # model: my-model  # uncomment to specify a model
    # binary: /absolute/path/to/opencode  # uncomment to override
    timeout: 180.0
program:
  parallel_corners: false
  randomize_sequential_fallback_order: true
  max_corner_generation_attempts: 1
  trace_dir: runs/traces
benchmark:
  pass_threshold: 0.75
