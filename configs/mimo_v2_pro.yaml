# OpenCode CLI with Mimo v2 Pro
model:
  runtime_model: cli/opencode/mimo-v2-pro
  backend:
    provider: opencode
    model: mimo-v2-pro
    timeout: 300.0
program:
  parallel_corners: false
  randomize_sequential_fallback_order: true
  max_corner_generation_attempts: 1
  trace_dir: runs/traces
benchmark:
  pass_threshold: 0.75
